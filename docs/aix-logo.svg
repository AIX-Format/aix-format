<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280" role="img" aria-label="AIX FORMAT — Sovereign Agent Standard Logo">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0e1520"/>
      <stop offset="100%" stop-color="#060a10"/>
    </radialGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5a623" stop-opacity="1"/>
      <stop offset="60%" stop-color="#f5a623" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#f5a623" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="900" height="280" fill="url(#bgGrad)" rx="16"/>
  <!-- Grid -->
  <g stroke="#00c8d4" stroke-opacity="0.05" stroke-width="1">
    <line x1="0" y1="70" x2="900" y2="70"/><line x1="0" y1="140" x2="900" y2="140"/><line x1="0" y1="210" x2="900" y2="210"/>
    <line x1="225" y1="0" x2="225" y2="280"/><line x1="450" y1="0" x2="450" y2="280"/><line x1="675" y1="0" x2="675" y2="280"/>
  </g>
  <!-- A -->
  <line x1="115" y1="230" x2="190" y2="50" stroke="#00c8d4" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="265" y1="230" x2="190" y2="50" stroke="#00c8d4" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="140" y1="158" x2="240" y2="158" stroke="#00c8d4" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="190" cy="50" r="28" fill="url(#nodeGlow)" opacity="0.7"/>
  <circle cx="190" cy="50" r="10" fill="#f5a623" filter="url(#softGlow)"/>
  <circle cx="190" cy="50" r="6" fill="#ffe0a0"/>
  <circle cx="190" cy="50" r="20" fill="none" stroke="#f5a623" stroke-width="1.5" stroke-opacity="0.5"/>
  <circle cx="190" cy="50" r="32" fill="none" stroke="#f5a623" stroke-width="1" stroke-opacity="0.22"/>
  <circle cx="115" cy="230" r="5" fill="#00c8d4" filter="url(#glow)"/>
  <circle cx="265" cy="230" r="5" fill="#00c8d4" filter="url(#glow)"/>
  <!-- I -->
  <line x1="450" y1="50" x2="450" y2="230" stroke="#00c8d4" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="415" y1="50" x2="485" y2="50" stroke="#00c8d4" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="415" y1="230" x2="485" y2="230" stroke="#00c8d4" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="450" cy="140" r="36" fill="none" stroke="#f5a623" stroke-width="1.5" stroke-dasharray="6 4" stroke-opacity="0.6"/>
  <circle cx="450" cy="140" r="52" fill="none" stroke="#f5a623" stroke-width="1" stroke-dasharray="3 7" stroke-opacity="0.2"/>
  <circle cx="450" cy="140" r="28" fill="url(#nodeGlow)" opacity="0.45"/>
  <circle cx="450" cy="140" r="9" fill="#f5a623" filter="url(#softGlow)"/>
  <circle cx="450" cy="140" r="5" fill="#ffe0a0"/>
  <!-- X -->
  <line x1="635" y1="50" x2="795" y2="230" stroke="#00c8d4" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="795" y1="50" x2="635" y2="230" stroke="#00c8d4" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="715" cy="140" r="40" fill="#0a0d14" stroke="#f5a623" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="715" cy="140" r="50" fill="none" stroke="#f5a623" stroke-width="1" stroke-opacity="0.25"/>
  <text x="715" y="153" text-anchor="middle" font-family="Georgia, serif" font-size="34" fill="#f5a623" filter="url(#softGlow)" font-weight="bold">&#960;</text>
  <circle cx="635" cy="50" r="6" fill="#00c8d4" filter="url(#glow)"/>
  <circle cx="795" cy="50" r="6" fill="#00c8d4" filter="url(#glow)"/>
  <circle cx="635" cy="230" r="6" fill="#00c8d4" filter="url(#glow)"/>
  <circle cx="795" cy="230" r="6" fill="#00c8d4" filter="url(#glow)"/>
  <!-- Wordmark -->
  <text x="450" y="268" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="11" fill="#00c8d4" letter-spacing="7" font-weight="500" opacity="0.7">AIX FORMAT &#8212; SOVEREIGN AGENT STANDARD</text>
</svg>
